spring:
  application:
    name: bk-payment-test
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  devtools:
    restart:
      enabled: true
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths: /**

server:
  port: ${PORT:8080}

# 비플페이 API URL — 개발/운영 분리
bpay:
  dev:
    base-url: https://dev-biz-zero.bizplay.co.kr
    reverse-base-url: https://dev-gift.appplay.co.kr:443
  prod:
    base-url: https://zero.appplay.co.kr
    reverse-base-url: https://gift.appplay.co.kr:8443
